<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="description" content="Éclairs - French phonics flashcards for kids">
  <meta name="theme-color" content="#E6E6FA">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Éclairs</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ============ HOME ============ -->
  <div class="screen active" id="screen-home">
    <div class="flipper" id="flipper">
      <div class="flip-card" id="flip-card">
        <!-- FRONT: Phonics -->
        <div class="flip-face flip-front">
          <div class="home-container">
            <h1 class="home-title">Éclairs</h1>
            <p class="home-subtitle">French Phonics</p>
            <div class="home-nav">
              <button class="glass-btn glass-btn-large" data-nav="practice">Practice</button>
              <div class="home-nav-row">
                <button class="glass-btn" data-nav="stats">Stats</button>
                <button class="glass-btn" data-nav="config">Settings</button>
              </div>
            </div>
          </div>
          <div class="song-picker" id="song-picker-phonics">
            <button class="song-btn song-btn-phonics active" data-song="0">Bouncy</button>
            <button class="song-btn song-btn-phonics" data-song="1">Mellow</button>
            <button class="song-btn song-btn-phonics" data-song="2">Jazzy</button>
          </div>
        </div>

        <!-- BACK: Numbers -->
        <div class="flip-face flip-back">
          <div class="home-container">
            <h1 class="home-title">Éclairs</h1>
            <p class="home-subtitle">Les Nombres</p>
            <div class="home-nav">
              <button class="glass-btn glass-btn-large" data-nav="numbers-practice">Practice</button>
              <div class="home-nav-row">
                <button class="glass-btn" data-nav="numbers-stats">Stats</button>
                <button class="glass-btn" data-nav="numbers-config">Settings</button>
              </div>
            </div>
          </div>
          <div class="song-picker" id="song-picker-numbers">
            <button class="song-btn song-btn-numbers active" data-song="3">Calculator</button>
            <button class="song-btn song-btn-numbers" data-song="4">Abacus</button>
            <button class="song-btn song-btn-numbers" data-song="5">Clockwork</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Mode switch (outside flip card, always visible) -->
    <button class="mode-switch" id="mode-switch">
      <span class="mode-label" id="mode-label">Nombres</span>
    </button>
  </div>

  <!-- ============ PRACTICE (shared for both modes) ============ -->
  <div class="screen" id="screen-practice">
    <button class="back-btn" data-nav="home">Back</button>
    <div class="practice-area">
      <div class="syllable-display" id="practice-syllable">b</div>
    </div>
    <div class="streak-board" id="streak-board">
      <div class="streak-line"><span class="streak-label">BEST</span><span class="streak-val" id="streak-best-val">0</span></div>
      <div class="streak-line"><span class="streak-label">STREAK</span><span class="streak-val streak-val-current" id="streak-current-val">0</span></div>
    </div>
    <div class="celebration-overlay" id="celebration-overlay"></div>
    <div class="practice-controls">
      <div class="score-buttons">
        <button class="score-btn score-wrong" id="btn-wrong" aria-label="Wrong">✗</button>
        <button class="score-btn score-correct" id="btn-correct" aria-label="Correct">✓</button>
      </div>
      <div class="session-counter" id="practice-counter"></div>
    </div>
    <div class="practice-toolbar">
      <button class="toolbar-btn" id="btn-turn-off">Turn off <span id="turn-off-label">b</span></button>
      <button class="toolbar-btn" id="btn-pause-stats">Stats on</button>
    </div>
  </div>

  <!-- ============ PHONICS CONFIG ============ -->
  <div class="screen" id="screen-config">
    <div class="scroll-container">
      <div class="screen-inner">
        <button class="back-btn" data-nav="home">Back</button>
        <h2 class="screen-title">Practice Items</h2>
        <div class="config-actions">
          <button class="pill-btn" id="btn-config-all">All</button>
          <button class="pill-btn" id="btn-config-clear">None</button>
          <button class="pill-btn" id="btn-config-reset">Defaults</button>
        </div>
        <div id="config-list" class="config-list"></div>
        <div id="config-message" class="config-message"></div>
        <button class="glass-btn glass-btn-large glass-btn-save" id="btn-config-save">Save</button>
      </div>
    </div>
  </div>

  <!-- ============ PHONICS STATS ============ -->
  <div class="screen" id="screen-stats">
    <div class="scroll-container">
      <div class="screen-inner">
        <button class="back-btn" data-nav="home">Back</button>
        <h2 class="screen-title">Stats</h2>
        <div id="stats-content" class="stats-content"></div>
      </div>
    </div>
  </div>

  <!-- ============ NUMBERS CONFIG ============ -->
  <div class="screen" id="screen-numbers-config">
    <div class="scroll-container">
      <div class="screen-inner">
        <button class="back-btn" data-nav="home">Back</button>
        <h2 class="screen-title">Number Tiers</h2>
        <div class="config-actions">
          <button class="pill-btn" id="btn-numconfig-all">All</button>
          <button class="pill-btn" id="btn-numconfig-clear">None</button>
          <button class="pill-btn" id="btn-numconfig-reset">Defaults</button>
        </div>
        <div id="numconfig-list" class="config-list"></div>
        <div id="numconfig-message" class="config-message"></div>
        <button class="glass-btn glass-btn-large glass-btn-save" id="btn-numconfig-save">Save</button>
      </div>
    </div>
  </div>

  <!-- ============ NUMBERS STATS ============ -->
  <div class="screen" id="screen-numbers-stats">
    <div class="scroll-container">
      <div class="screen-inner">
        <button class="back-btn" data-nav="home">Back</button>
        <h2 class="screen-title">Number Stats</h2>
        <div id="numbers-stats-content" class="stats-content"></div>
      </div>
    </div>
  </div>

  <script src="js/syllables.js"></script>
  <script src="js/numbers.js"></script>
  <script src="js/haptics.js"></script>
  <script src="js/sounds.js"></script>
  <script src="js/music.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
